name: Lint and Code Quality

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [flake8, black]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run flake8
        if: matrix.check == 'flake8'
        run: |
          # Only check Python files in the main directories
          flake8 core/ locations/ users/ categories/ manage.py

      - name: Run black
        if: matrix.check == 'black'
        run: |
          # Only check Python files in the main directories
          black --check core/ locations/ users/ categories/ manage.py
